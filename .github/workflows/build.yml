name: Build and Release Windows Executable

on:
  push:
    branches:
      - master
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm ci

      - name: Build TypeScript
        run: npm run build

      - name: Install pkg
        run: npm install -g pkg

      - name: Pack to Windows Executable
        run: pkg package.json --targets node18-win-x64 --output agent-tools.exe

      - name: Upload Artifact
        uses: actions/upload-artifact@v3
        with:
          name: agent-tools-windows
          path: agent-tools.exe

      - name: Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: agent-tools.exe
